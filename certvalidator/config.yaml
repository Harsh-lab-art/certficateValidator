# ml/config.yaml
# Single source of truth for all model hyperparameters and paths.
# Import with: from ml.src.utils.config import load_config

project:
  name: certvalidator
  version: "0.1.0"

paths:
  data_root:       ml/data
  raw:             ml/data/raw
  processed:       ml/data/processed
  synthetic:       ml/data/synthetic
  annotated:       ml/data/annotated
  ela:             ml/data/ela
  checkpoints:     ml/models/checkpoints
  logs:            ml/models/logs
  llm:             ml/models/llm

preprocessing:
  target_dpi:      300
  target_long_side: 2480
  ela_quality:     90
  deskew:          true
  denoise:         true
  crop_borders:    true

dataset:
  img_size:        [768, 1088]   # H, W
  train_split:     0.70
  val_split:       0.15
  test_split:      0.15
  random_seed:     42

augmentation:
  enabled:         true
  p:               0.80
  rotation_limit:  2.5
  scale_limit:     0.05
  brightness_limit: 0.15
  noise_var:       [5.0, 30.0]

synthetic:
  count:           2000
  fake_ratio:      0.50
  seed:            42

# ── Model 1: Forgery detector (EfficientNet-B4 + ELA) ─────────────────────
forgery_model:
  architecture:    efficientnet_b4
  in_channels:     6           # RGB (3) + ELA (3)
  num_classes:     2           # 0=genuine, 1=fake
  pretrained:      true
  dropout:         0.3
  img_size:        [512, 724]  # smaller crop for faster forgery training

  training:
    batch_size:    8
    epochs:        30
    lr:            3.0e-4
    weight_decay:  1.0e-4
    scheduler:     cosine
    warmup_epochs: 3
    label_smoothing: 0.05
    amp:           true        # automatic mixed precision (saves VRAM)
    grad_clip:     1.0

  early_stopping:
    patience:      6
    monitor:       val_auc

  export:
    onnx:          true
    onnx_opset:    17
    dynamic_axes:  true

# ── Model 2: OCR (TrOCR fine-tune) ────────────────────────────────────────
ocr_model:
  base:            microsoft/trocr-base-printed
  max_length:      128
  beam_size:       4

  training:
    batch_size:    4
    epochs:        10
    lr:            5.0e-5
    weight_decay:  1.0e-5
    warmup_steps:  500

# ── Model 3: Field extraction (LayoutLMv3) ────────────────────────────────
layout_model:
  base:            microsoft/layoutlmv3-base
  max_seq_length:  512
  num_labels:      9     # O, B-NAME, I-NAME, B-INST, I-INST, B-DATE, B-GRADE, B-ROLL, B-DEGREE

  training:
    batch_size:    2
    epochs:        15
    lr:            2.0e-5
    weight_decay:  1.0e-5

# ── Trust score fusion ────────────────────────────────────────────────────
fusion:
  weights:
    forgery:       0.45
    field:         0.35
    nlp:           0.20
  thresholds:
    genuine:       75.0    # score >= 75 → GENUINE
    suspicious:    45.0    # 45 <= score < 75 → SUSPICIOUS
    fake:          0.0     # score < 45 → FAKE

# ── LLM (Mistral-7B GGUF) ────────────────────────────────────────────────
llm:
  model_file:      mistral-7b-instruct-v0.2.Q4_K_M.gguf
  context_length:  4096
  max_new_tokens:  300
  temperature:     0.1
  n_gpu_layers:    20    # layers offloaded to RTX 3050 GPU
  n_threads:       8

# ── MLflow tracking ───────────────────────────────────────────────────────
mlflow:
  tracking_uri:    http://localhost:5000
  experiment:      certvalidator_v1
